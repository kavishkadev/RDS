name: macOS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: System Info
        run: |
          echo "macOS Version: $(sw_vers -productVersion)"
          echo "Architecture: $(uname -m)"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "macOS Bot"
          git config user.email "macosbot@github.com"

      # ─── RESTORE BACKUP ───
      - name: Restore previous session
        run: |
          if [ -f "backup/userdata.tar.gz" ]; then
            echo "Restoring backup..."
            tar -xzf backup/userdata.tar.gz -C ~/ 2>/dev/null || true
          fi

      # ─── SET PASSWORD ───
      - name: Set user password
        run: |
          echo "runner:${{ secrets.VNC_PASSWORD }}" | sudo dscl . -passwd /Users/runner "${{ secrets.VNC_PASSWORD }}"
          sudo dscl . -create /Users/runner IsHidden bool false
          echo "Password configured"

      # ─── ENABLE SSH ───
      - name: Enable SSH
        run: |
          sudo systemsetup -setremotelogin on
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          echo "SSH enabled"

      # ─── ENABLE VNC ───
      - name: Enable Screen Sharing
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ secrets.VNC_PASSWORD }}" \
            -restart -agent -privs -all
          
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sleep 3
          echo "VNC enabled on port 5900"

      # ─── INSTALL TAILSCALE ───
      - name: Install Tailscale
        run: |
          brew install --cask tailscale || brew install tailscale
          
          # Verify installation
          if ! command -v tailscale &>/dev/null; then
            echo "❌ Tailscale installation failed"
            exit 1
          fi
          
          echo "✅ Tailscale installed: $(tailscale --version)"

      # ─── CONNECT TAILSCALE (FIXED) ───
      - name: Connect Tailscale
        id: tailscale
        run: |
          echo "🔄 Starting Tailscale connection..."
          
          # Kill any existing tailscaled
          sudo pkill tailscaled 2>/dev/null || true
          sleep 2
          
          # Start tailscaled daemon in background
          echo "📡 Starting tailscaled daemon..."
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket=/tmp/tailscaled.sock \
            --port=41641 \
            > /tmp/tailscaled.log 2>&1 &
          
          DAEMON_PID=$!
          echo "Daemon PID: $DAEMON_PID"
          
          # Wait for daemon to be ready
          echo "⏳ Waiting for daemon..."
          for i in {1..15}; do
            if [ -S /tmp/tailscaled.sock ]; then
              echo "✅ Socket ready after $i seconds"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "❌ Socket not created. Log:"
              cat /tmp/tailscaled.log 2>/dev/null || echo "No log"
              exit 1
            fi
            sleep 1
          done
          
          # Authenticate and connect
          echo "🔐 Authenticating..."
          sudo tailscale up \
            --authkey="${{ secrets.TS_AUTHKEY }}" \
            --hostname="github-macos-$(date +%s)" \
            --accept-routes \
            --socket=/tmp/tailscaled.sock \
            --timeout=60s
          
          if [ $? -ne 0 ]; then
            echo "❌ Authentication failed"
            cat /tmp/tailscaled.log
            exit 1
          fi
          
          # Get IP address
          TS_IP=$(sudo tailscale ip -4 --socket=/tmp/tailscaled.sock)
          
          if [ -z "$TS_IP" ]; then
            echo "❌ Failed to get IP"
            exit 1
          fi
          
          echo "✅ Connected! IP: $TS_IP"
          
          # Save connection info
          echo "MACOS_IP=$TS_IP" > vnc-info.txt
          echo "USERNAME=runner" >> vnc-info.txt
          echo "VNC_PORT=5900" >> vnc-info.txt
          echo "SSH_PORT=22" >> vnc-info.txt
          echo "STARTED=$(date '+%Y-%m-%d %H:%M:%S UTC')" >> vnc-info.txt
          echo "DAEMON_PID=$DAEMON_PID" >> vnc-info.txt
          
          # Set output for next steps
          echo "ip=$TS_IP" >> $GITHUB_OUTPUT

      # ─── SHOW CONNECTION INFO ───
      - name: Connection Details
        run: |
          TS_IP="${{ steps.tailscale.outputs.ip }}"
          
          echo "========================================"
          echo "  🍎 macOS REMOTE SERVER READY!"
          echo "========================================"
          echo "  🌐 TAILSCALE IP: $TS_IP"
          echo "  👤 USERNAME: runner"
          echo "  🔑 PASSWORD: (your VNC_PASSWORD secret)"
          echo "========================================"
          echo "  📺 VNC (Screen Sharing):"
          echo "     Host: $TS_IP:5900"
          echo "     Use: RealVNC Viewer or Screen Sharing app"
          echo "========================================"
          echo "  💻 SSH Access:"
          echo "     ssh runner@$TS_IP"
          echo "========================================"
          echo "  📋 Connection file saved to vnc-info.txt"
          echo "========================================"

      # ─── PUSH INFO TO REPO ───
      - name: Push connection info
        run: |
          git add vnc-info.txt
          git commit -m "Update macOS IP - $(date '+%H:%M')" || true
          git push origin HEAD || true

      # ─── KEEP ALIVE SESSION ───
      - name: Keep session alive (4h 30m)
        run: |
          echo "⏰ Session active for 4h 30m..."
          echo "💡 Connect via: ssh runner@${{ steps.tailscale.outputs.ip }}"
          
          # Keep alive with periodic status
          for i in {1..270}; do
            if [ $((i % 30)) -eq 0 ]; then
              echo "⏳ Session active: $((i/60))h $((i%60))m"
              # Verify Tailscale still connected
              tailscale status >/dev/null 2>&1 || echo "⚠️ Tailscale disconnected!"
            fi
            sleep 60
          done

      # ─── BACKUP DATA ───
      - name: Backup user data
        run: |
          mkdir -p backup
          tar -czf backup/userdata.tar.gz \
            ~/Desktop ~/Documents ~/Downloads 2>/dev/null || true
          
          git add backup/userdata.tar.gz vnc-info.txt
          git commit -m "Backup $(date '+%Y-%m-%d')" || true
          git push || true

      # ─── TRIGGER NEXT RUN ───
      - name: Trigger next session
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run "${{ github.workflow }}"
          echo "✅ Next session triggered!"
