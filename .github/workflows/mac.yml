name: macOS Remote Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      # ─────────────────────────────────────────
      # SYSTEM INFO
      # ─────────────────────────────────────────
      - name: System Info
        run: |
          echo "========================================"
          echo "macOS Version : $(sw_vers -productVersion)"
          echo "Build         : $(sw_vers -buildVersion)"
          echo "CPU           : $(sysctl -n machdep.cpu.brand_string)"
          echo "Cores         : $(sysctl -n hw.ncpu)"
          echo "RAM           : $(( $(sysctl -n hw.memsize) / 1073741824 )) GB"
          echo "Disk Free     : $(df -h / | awk 'NR==2{print $4}')"
          echo "========================================"

      # ─────────────────────────────────────────
      # CHECKOUT REPO
      # ─────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "macOS Bot"
          git config user.email "macosbot@github.com"

      # ─────────────────────────────────────────
      # RESTORE BACKUP
      # ─────────────────────────────────────────
      - name: Restore previous session data
        run: |
          if [ -f "backup/userdata.tar.gz" ]; then
            echo "Backup found! Restoring..."
            tar -xzf backup/userdata.tar.gz -C ~/ 2>/dev/null || true
            echo "Restore complete!"
          else
            echo "No backup found. Starting fresh."
          fi

      # ─────────────────────────────────────────
      # SET USER PASSWORD
      # ─────────────────────────────────────────
      - name: Set user password
        run: |
          # Set password using dscl
          sudo dscl . -passwd /Users/runner "${{ secrets.VNC_PASSWORD }}" 2>/dev/null || true
          # Fallback method
          echo "runner:${{ secrets.VNC_PASSWORD }}" | sudo chpasswd 2>/dev/null || true
          echo "Password set for runner!"

      # ─────────────────────────────────────────
      # ENABLE SSH
      # ─────────────────────────────────────────
      - name: Enable SSH
        run: |
          sudo systemsetup -setremotelogin on 2>/dev/null || true
          sudo launchctl load -w \
            /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sleep 2
          echo "SSH enabled!"
          sudo lsof -i :22 2>/dev/null | head -3 || true

      # ─────────────────────────────────────────
      # ENABLE SCREEN SHARING (VNC)
      # ─────────────────────────────────────────
      - name: Enable Screen Sharing VNC
        run: |
          echo "Enabling VNC screen sharing..."

          # Primary method - ARD kickstart
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ secrets.VNC_PASSWORD }}" \
            -restart -agent \
            2>/dev/null || true

          # Secondary method - launchctl
          sudo launchctl load -w \
            /System/Library/LaunchDaemons/com.apple.screensharing.plist \
            2>/dev/null || true

          # Tertiary method - defaults
          sudo defaults write \
            /var/db/launchd.db/com.apple.launchd/overrides.plist \
            com.apple.screensharing \
            -dict Disabled -bool false 2>/dev/null || true

          sleep 5

          # Verify VNC port
          echo "VNC port check:"
          sudo lsof -i :5900 2>/dev/null | head -5 || echo "Port 5900 status unknown"
          echo "VNC enabled!"

      # ─────────────────────────────────────────
      # INSTALL TOOLS
      # ─────────────────────────────────────────
      - name: Install useful tools
        run: |
          echo "Installing tools..."
          brew install --quiet wget curl htop 2>/dev/null || true
          echo "Done!"

      # ─────────────────────────────────────────
      # INSTALL TAILSCALE (direct binary - most reliable)
      # ─────────────────────────────────────────
      - name: Install Tailscale
        run: |
          echo "Installing Tailscale via direct binary..."

          # Get latest version
          TS_VERSION=$(curl -s https://pkgs.tailscale.com/stable/ | \
            grep -oE 'tailscale_[0-9]+\.[0-9]+\.[0-9]+_amd64' | \
            head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

          if [ -z "$TS_VERSION" ]; then
            TS_VERSION="1.96.4"
          fi

          echo "Using Tailscale version: $TS_VERSION"

          # Download tarball
          curl -fsSL \
            "https://pkgs.tailscale.com/stable/tailscale_${TS_VERSION}_amd64.tgz" \
            -o /tmp/tailscale.tgz

          # Extract
          tar -xzf /tmp/tailscale.tgz -C /tmp/
          TS_DIR=$(ls /tmp/ | grep "tailscale_" | head -1)
          echo "Extracted to: /tmp/$TS_DIR"

          # Install binaries
          sudo cp "/tmp/$TS_DIR/tailscale" /usr/local/bin/
          sudo cp "/tmp/$TS_DIR/tailscaled" /usr/local/bin/
          sudo chmod +x /usr/local/bin/tailscale
          sudo chmod +x /usr/local/bin/tailscaled

          echo "Tailscale version: $(tailscale version)"
          echo "Tailscale installed!"

      # ─────────────────────────────────────────
      # CONNECT TAILSCALE
      # ─────────────────────────────────────────
      - name: Connect Tailscale
        run: |
          # Kill any existing processes
          sudo pkill tailscaled 2>/dev/null || true
          sleep 3

          # Create state directory
          sudo mkdir -p /var/lib/tailscale

          # Start tailscaled daemon
          echo "Starting tailscaled..."
          sudo /usr/local/bin/tailscaled \
            --state=/var/lib/tailscale/tailscaled.state \
            --socket=/var/run/tailscaled.socket \
            > /tmp/tailscaled.log 2>&1 &

          DAEMON_PID=$!
          echo "tailscaled PID: $DAEMON_PID"

          # Wait for daemon to be ready
          echo "Waiting for daemon..."
          for i in {1..15}; do
            sleep 2
            if [ -S /var/run/tailscaled.socket ]; then
              echo "Daemon ready!"
              break
            fi
            echo "Waiting... $i/15"
          done

          # Connect to Tailscale
          echo "Connecting..."
          sudo /usr/local/bin/tailscale up \
            --authkey="${{ secrets.TS_AUTHKEY }}" \
            --hostname="github-macos-vnc" \
            --accept-routes \
            --socket=/var/run/tailscaled.socket \
            2>&1 &

          # Wait for connection
          echo "Waiting for IP..."
          TS_IP=""
          for i in {1..30}; do
            sleep 3
            TS_IP=$(sudo /usr/local/bin/tailscale ip -4 \
              --socket=/var/run/tailscaled.socket 2>/dev/null | \
              head -1 | tr -d '[:space:]')
            if [[ "$TS_IP" == 100.* ]]; then
              echo "Got IP: $TS_IP"
              break
            fi
            echo "Attempt $i/30 - waiting for IP..."
          done

          # Show log if no IP
          if [[ "$TS_IP" != 100.* ]]; then
            echo "===== TAILSCALE LOG ====="
            cat /tmp/tailscaled.log
            echo "===== END ====="
            echo "Check: https://login.tailscale.com/admin/machines"
            TS_IP="check-tailscale-dashboard"
          fi

          echo "========================================"
          echo "  Tailscale Connected!"
          echo "  FIXED IP  : $TS_IP"
          echo "  USERNAME  : runner"
          echo "  PASSWORD  : your VNC_PASSWORD secret"
          echo "  VNC PORT  : 5900"
          echo "  SSH PORT  : 22"
          echo "========================================"

          # Save info
          echo "MACOS_IP=$TS_IP"            > vnc-info.txt
          echo "USERNAME=runner"            >> vnc-info.txt
          echo "VNC_PORT=5900"              >> vnc-info.txt
          echo "SSH_PORT=22"               >> vnc-info.txt
          echo "SSH_CMD=ssh runner@$TS_IP" >> vnc-info.txt
          echo "VNC_CONNECT=$TS_IP:5900"   >> vnc-info.txt
          echo "STARTED=$(date '+%Y-%m-%d %H:%M:%S UTC')"       >> vnc-info.txt
          echo "EXPIRES=$(date -v+5H '+%Y-%m-%d %H:%M:%S UTC')" >> vnc-info.txt

      # ─────────────────────────────────────────
      # PUSH CONNECTION INFO
      # ─────────────────────────────────────────
      - name: Push connection info to repo
        run: |
          git add vnc-info.txt
          git diff --staged --quiet || \
            git commit -m "macOS VNC IP - $(date '+%H:%M:%S')"
          git push origin HEAD || true

      # ─────────────────────────────────────────
      # CONNECTION DETAILS
      # ─────────────────────────────────────────
      - name: Connection Details
        run: |
          TS_IP=$(grep "MACOS_IP" vnc-info.txt | cut -d= -f2)
          echo "========================================"
          echo "  macOS VNC - READY TO CONNECT!"
          echo "========================================"
          echo "  TAILSCALE IP : $TS_IP"
          echo "  USERNAME     : runner"
          echo "  PASSWORD     : your VNC_PASSWORD secret"
          echo "========================================"
          echo "  VNC (RealVNC Viewer):"
          echo "  Host   : $TS_IP"
          echo "  Port   : 5900"
          echo "  Enter  : $TS_IP:5900"
          echo "========================================"
          echo "  SSH (Terminal):"
          echo "  ssh runner@$TS_IP"
          echo "========================================"
          echo "  HOW TO CONNECT FROM WINDOWS:"
          echo "  1. Install Tailscale on Windows PC"
          echo "     tailscale.com/download"
          echo "  2. Login with SAME Tailscale account"
          echo "  3. Open RealVNC Viewer"
          echo "  4. Type: $TS_IP"
          echo "  5. Password: your VNC_PASSWORD"
          echo "========================================"
          echo "  macOS   : $(sw_vers -productVersion)"
          echo "  RAM     : $(( $(sysctl -n hw.memsize) / 1073741824 )) GB"
          echo "  CPU     : $(sysctl -n hw.ncpu) cores"
          echo "  DISK    : $(df -h / | awk 'NR==2{print $4}') free"
          echo "========================================"
          echo "  IP FIXED - same every restart!"
          echo "  Auto-restarts every 5 hours"
          echo "========================================"

      # ─────────────────────────────────────────
      # SESSION 4h 30min
      # ─────────────────────────────────────────
      - name: Active session 4h 30min
        run: |
          TS_IP=$(grep "MACOS_IP" vnc-info.txt | cut -d= -f2)
          echo "Session active - VNC: $TS_IP:5900"
          sleep 16200

      # ─────────────────────────────────────────
      # BACKUP TO REPO
      # ─────────────────────────────────────────
      - name: Backup user data
        run: |
          echo "Starting backup..."
          mkdir -p backup

          tar -czf backup/userdata.tar.gz \
            --exclude='**/.cache' \
            --exclude='**/__pycache__' \
            --exclude='**/node_modules' \
            --exclude='**/.DS_Store' \
            ~/Desktop \
            ~/Documents \
            ~/Downloads \
            2>/dev/null || true

          if [ -f backup/userdata.tar.gz ]; then
            SIZE=$(du -sh backup/userdata.tar.gz | cut -f1)
            echo "Backup complete! Size: $SIZE"
          else
            echo "Nothing to backup yet."
          fi

      - name: Push backup to GitHub
        run: |
          git add backup/userdata.tar.gz vnc-info.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to backup."
          else
            git commit -m "Auto backup - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD
            echo "Backup pushed!"
          fi

      # ─────────────────────────────────────────
      # TRIGGER NEXT RUN
      # ─────────────────────────────────────────
      - name: Trigger next session
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run macos.yml
          echo "Next session triggered!"
          echo "macOS VNC ready again in about 3 minutes!"
