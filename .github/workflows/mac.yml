name: macOS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      - name: System Info
        run: |
          echo "🍎 macOS $(sw_vers -productVersion)"
          echo "📦 Actions Runner: $RUNNER_NAME"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "macOS Bot"
          git config user.email "macosbot@github.com"

      # Restore backup
      - name: Restore previous session
        run: |
          if [ -f "backup/userdata.tar.gz" ]; then
            echo "📦 Restoring backup..."
            tar -xzf backup/userdata.tar.gz -C ~/ 2>/dev/null || true
          fi

      # Enable SSH
      - name: Enable SSH
        run: |
          echo "🔐 Enabling SSH..."
          sudo systemsetup -setremotelogin on >/dev/null 2>&1
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          echo "✅ SSH enabled"

      # Enable VNC
      - name: Enable Screen Sharing
        run: |
          echo "🖥️  Enabling VNC..."
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -configure -allowAccessFor -allUsers \
            -configure -restart -agent -privs -all 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          echo "✅ VNC enabled"

      # Install Tailscale
      - name: Install Tailscale
        run: |
          echo "🌐 Installing Tailscale..."
          brew install --cask tailscale 2>&1 | tail -5
          echo "✅ Tailscale installed"

      # Connect Tailscale - SIMPLIFIED
      - name: Connect Tailscale
        id: connect
        run: |
          echo "🔄 Connecting to Tailscale..."
          
          # Login and connect
          sudo tailscale up \
            --authkey="${{ secrets.TS_AUTHKEY }}" \
            --hostname="macos-gh-$(date +%s)" \
            --accept-routes \
            --timeout=90s 2>&1 | tee /tmp/ts-connect.log
          
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Connection failed!"
            cat /tmp/ts-connect.log
            exit 1
          fi
          
          # Get IP
          TS_IP=$(tailscale ip -4)
          
          if [ -z "$TS_IP" ]; then
            echo "❌ No IP assigned"
            tailscale status
            exit 1
          fi
          
          echo "✅ Connected! IP: $TS_IP"
          
          # Save info
          cat > vnc-info.txt << EOF
          MACOS_IP=$TS_IP
          USERNAME=runner
          VNC_PORT=5900
          SSH_PORT=22
          STARTED=$(date '+%Y-%m-%d %H:%M:%S UTC')
          EOF
          
          echo "ip=$TS_IP" >> $GITHUB_OUTPUT

      - name: Push connection info
        run: |
          git add vnc-info.txt
          git commit -m "Update IP: $(date '+%H:%M')" || true
          git push || true

      - name: Show Connection Details
        run: |
          TS_IP="${{ steps.connect.outputs.ip }}"
          cat << EOF
          
          ========================================
            🍎 macOS REMOTE READY!
          ========================================
            🌐 IP: $TS_IP
            👤 User: runner
          ========================================
            💻 SSH: ssh runner@$TS_IP
            🖥️  VNC: $TS_IP:5900
          ========================================
            Steps:
            1. Install Tailscale on your PC
            2. Login to same account
            3. Connect: ssh runner@$TS_IP
          ========================================
          
          EOF

      # Keep alive - simpler approach
      - name: Keep session alive
        run: |
          TS_IP="${{ steps.connect.outputs.ip }}"
          echo "⏰ Keeping session alive for 4h 30m..."
          echo "💡 Connect: ssh runner@$TS_IP"
          
          # Simple loop with status checks
          for i in $(seq 1 270); do
            # Status every 30 minutes
            if [ $((i % 30)) -eq 0 ]; then
              echo "⏳ ${i}min elapsed - IP: $TS_IP"
              tailscale status >/dev/null 2>&1 || echo "⚠️ TS disconnected"
            fi
            sleep 60
          done

      # Backup
      - name: Backup data
        run: |
          mkdir -p backup
          tar -czf backup/userdata.tar.gz ~/Desktop ~/Documents ~/Downloads 2>/dev/null || true
          git add backup/ vnc-info.txt
          git commit -m "Backup $(date '+%H:%M')" || true
          git push || true

      # Trigger next
      - name: Trigger next run
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run "${{ github.workflow }}"
          echo "✅ Next run triggered"
