name: macOS Remote Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      # ─────────────────────────────────────────
      # SYSTEM INFO
      # ─────────────────────────────────────────
      - name: System Info
        run: |
          echo "========================================"
          echo "macOS Version : $(sw_vers -productVersion)"
          echo "Architecture  : $(uname -m)"
          echo "Cores         : $(sysctl -n hw.ncpu)"
          echo "RAM           : $(( $(sysctl -n hw.memsize) / 1073741824 )) GB"
          echo "Disk Free     : $(df -h / | awk 'NR==2{print $4}')"
          echo "========================================"

      # ─────────────────────────────────────────
      # CHECKOUT REPO
      # ─────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "macOS Bot"
          git config user.email "macosbot@github.com"

      # ─────────────────────────────────────────
      # RESTORE BACKUP
      # ─────────────────────────────────────────
      - name: Restore previous session data
        run: |
          if [ -f "backup/userdata.tar.gz" ]; then
            echo "Backup found! Restoring..."
            tar -xzf backup/userdata.tar.gz -C ~/ 2>/dev/null || true
            echo "Restore complete!"
          else
            echo "No backup found. Starting fresh."
          fi

      # ─────────────────────────────────────────
      # SET USER PASSWORD
      # ─────────────────────────────────────────
      - name: Set user password
        run: |
          sudo dscl . -passwd /Users/runner "${{ secrets.VNC_PASSWORD }}" 2>/dev/null || true
          echo "runner:${{ secrets.VNC_PASSWORD }}" | sudo chpasswd 2>/dev/null || true
          echo "Password set!"

      # ─────────────────────────────────────────
      # ENABLE SSH
      # ─────────────────────────────────────────
      - name: Enable SSH
        run: |
          sudo systemsetup -setremotelogin on 2>/dev/null || true
          sudo launchctl load -w \
            /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sleep 2
          echo "SSH enabled!"

      # ─────────────────────────────────────────
      # ENABLE VNC SCREEN SHARING
      # ─────────────────────────────────────────
      - name: Enable Screen Sharing VNC
        run: |
          echo "Enabling VNC..."

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ secrets.VNC_PASSWORD }}" \
            -restart -agent \
            2>/dev/null || true

          sudo launchctl load -w \
            /System/Library/LaunchDaemons/com.apple.screensharing.plist \
            2>/dev/null || true

          sleep 5
          echo "VNC enabled!"
          sudo lsof -i :5900 2>/dev/null | head -5 || echo "Port 5900 checked"

      # ─────────────────────────────────────────
      # INSTALL TAILSCALE
      # ─────────────────────────────────────────
      - name: Install Tailscale
        run: |
          echo "Installing Tailscale via brew..."
          brew install tailscale
          echo "Version: $(tailscale version)"
          echo "Path: $(which tailscale)"
          echo "Tailscale installed!"

      # ─────────────────────────────────────────
      # CONNECT TAILSCALE (no --socket flag)
      # ─────────────────────────────────────────
      - name: Connect Tailscale
        run: |
          # Kill existing
          sudo pkill -9 tailscaled 2>/dev/null || true
          sleep 3

          # Find brew tailscaled path
          TAILSCALED=$(which tailscaled 2>/dev/null || \
            find /opt/homebrew /usr/local -name "tailscaled" 2>/dev/null | head -1)
          TAILSCALE=$(which tailscale 2>/dev/null || \
            find /opt/homebrew /usr/local -name "tailscale" \
            -not -name "tailscaled" 2>/dev/null | head -1)

          echo "tailscaled: $TAILSCALED"
          echo "tailscale : $TAILSCALE"

          # Create state dir
          sudo mkdir -p /var/lib/tailscale

          # Start tailscaled (NO --socket flag for brew version)
          echo "Starting tailscaled..."
          sudo "$TAILSCALED" \
            --state=/var/lib/tailscale/tailscaled.state \
            > /tmp/tailscaled.log 2>&1 &

          echo "Waiting for tailscaled to start..."
          sleep 10

          # Connect (NO --socket flag)
          echo "Connecting to Tailscale..."
          sudo "$TAILSCALE" up \
            --authkey="${{ secrets.TS_AUTHKEY_MAC }}" \
            --hostname="github-macos-vnc" \
            --accept-routes \
            --timeout=30s \
            > /tmp/tsup.log 2>&1

          echo "tailscale up exit: $?"
          cat /tmp/tsup.log || true

          sleep 5

          # Get IP (NO --socket flag)
          echo "Getting IP..."
          TS_IP=""
          for i in {1..20}; do
            sleep 3
            TS_IP=$(sudo "$TAILSCALE" ip -4 2>/dev/null | \
              head -1 | tr -d '[:space:]')
            if [[ "$TS_IP" == 100.* ]]; then
              echo "Got IP: $TS_IP"
              break
            fi
            echo "Attempt $i/20..."
          done

          if [[ "$TS_IP" != 100.* ]]; then
            echo "===== tailscaled LOG ====="
            cat /tmp/tailscaled.log || true
            echo "===== tailscale up LOG ====="
            cat /tmp/tsup.log || true
            echo "Check: https://login.tailscale.com/admin/machines"
            TS_IP="check-tailscale-dashboard"
          fi

          echo "========================================"
          echo "  FIXED IP  : $TS_IP"
          echo "  USERNAME  : runner"
          echo "  VNC PORT  : 5900"
          echo "  SSH PORT  : 22"
          echo "========================================"

          echo "MACOS_IP=$TS_IP"              > vnc-info.txt
          echo "USERNAME=runner"              >> vnc-info.txt
          echo "VNC_PORT=5900"               >> vnc-info.txt
          echo "SSH_PORT=22"                 >> vnc-info.txt
          echo "VNC_CONNECT=$TS_IP:5900"     >> vnc-info.txt
          echo "SSH_CMD=ssh runner@$TS_IP"   >> vnc-info.txt
          echo "STARTED=$(date '+%Y-%m-%d %H:%M:%S UTC')"       >> vnc-info.txt
          echo "EXPIRES=$(date -v+5H '+%Y-%m-%d %H:%M:%S UTC')" >> vnc-info.txt

      # ─────────────────────────────────────────
      # PUSH CONNECTION INFO
      # ─────────────────────────────────────────
      - name: Push connection info to repo
        run: |
          git add vnc-info.txt
          git diff --staged --quiet || \
            git commit -m "macOS VNC IP - $(date '+%H:%M:%S')"
          git push origin HEAD || true

      # ─────────────────────────────────────────
      # CONNECTION DETAILS
      # ─────────────────────────────────────────
      - name: Connection Details
        run: |
          TS_IP=$(grep "MACOS_IP" vnc-info.txt | cut -d= -f2)
          echo "========================================"
          echo "  macOS VNC - READY TO CONNECT!"
          echo "========================================"
          echo "  TAILSCALE IP : $TS_IP"
          echo "  USERNAME     : runner"
          echo "  PASSWORD     : your VNC_PASSWORD secret"
          echo "========================================"
          echo "  VNC - RealVNC Viewer:"
          echo "  Address: $TS_IP"
          echo "  Password: your VNC_PASSWORD"
          echo "========================================"
          echo "  SSH - Terminal/PuTTY:"
          echo "  ssh runner@$TS_IP"
          echo "========================================"
          echo "  STEPS FROM WINDOWS:"
          echo "  1. Install Tailscale -> tailscale.com/download"
          echo "  2. Login with SAME Tailscale account"
          echo "  3. Install RealVNC Viewer"
          echo "  4. Open RealVNC -> type: $TS_IP"
          echo "  5. Password: your VNC_PASSWORD"
          echo "========================================"
          echo "  macOS  : $(sw_vers -productVersion)"
          echo "  Arch   : $(uname -m)"
          echo "  RAM    : $(( $(sysctl -n hw.memsize) / 1073741824 )) GB"
          echo "  CPU    : $(sysctl -n hw.ncpu) cores"
          echo "  DISK   : $(df -h / | awk 'NR==2{print $4}') free"
          echo "========================================"

      # ─────────────────────────────────────────
      # SESSION 4h 30min
      # ─────────────────────────────────────────
      - name: Active session 4h 30min
        run: |
          TS_IP=$(grep "MACOS_IP" vnc-info.txt | cut -d= -f2)
          echo "Session active!"
          echo "VNC: $TS_IP:5900"
          echo "SSH: ssh runner@$TS_IP"
          sleep 16200

      # ─────────────────────────────────────────
      # BACKUP
      # ─────────────────────────────────────────
      - name: Backup user data
        run: |
          echo "Starting backup..."
          mkdir -p backup
          tar -czf backup/userdata.tar.gz \
            --exclude='**/.cache' \
            --exclude='**/__pycache__' \
            --exclude='**/node_modules' \
            --exclude='**/.DS_Store' \
            ~/Desktop \
            ~/Documents \
            ~/Downloads \
            2>/dev/null || true
          if [ -f backup/userdata.tar.gz ]; then
            SIZE=$(du -sh backup/userdata.tar.gz | cut -f1)
            echo "Backup complete! Size: $SIZE"
          else
            echo "Nothing to backup yet."
          fi

      - name: Push backup to GitHub
        run: |
          git add backup/userdata.tar.gz vnc-info.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to backup."
          else
            git commit -m "Auto backup - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD
            echo "Backup pushed!"
          fi

      # ─────────────────────────────────────────
      # TRIGGER NEXT RUN
      # ─────────────────────────────────────────
      - name: Trigger next session
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run macos.yml
          echo "Next session triggered!"
          echo "macOS VNC ready again in about 3 minutes!"
