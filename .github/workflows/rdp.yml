name: Kavishka RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: 👤 Create user
        run: |
          sudo useradd -m -s /bin/bash kavishka
          echo "kavishka:${{ secrets.RDP_PASSWORD }}" | sudo chpasswd
          sudo usermod -aG sudo kavishka

      - name: 📥 Install XRDP
        run: |
          sudo apt update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            xfce4 xfce4-goodies xrdp xorgxrdp --no-install-recommends
          echo "startxfce4" | sudo tee /home/kavishka/.xsession > /dev/null
          sudo chown kavishka:kavishka /home/kavishka/.xsession

      - name: 🚀 Start XRDP
        run: |
          sudo xrdp || true
          sudo xrdp-sesman || true
          sleep 3

      - name: 🌐 Cloudflare Tunnel
        env:
          CF_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared tunnel run --token $CF_TOKEN > /tmp/cf.log 2>&1 &
          sleep 15
          echo "✅ Tunnel started"

      - name: 📋 Connection Info
        run: |
          echo "========================================"
          echo "  ✅ RDP READY!"
          echo "========================================"
          echo "  👤 Username: kavishka"
          echo "  🔑 Password: ${{ secrets.RDP_PASSWORD }}"
          echo ""
          echo "  🌐 ADD ROUTE IN CLOUDFLARE:"
          echo "     1. Go to your tunnel → Routes tab"
          echo "     2. Add route:"
          echo "        - Subdomain: rdp"
          echo "        - Domain: trycloudflare.com (TYPE IT MANUALLY)"
          echo "        - Type: TCP"
          echo "        - URL: localhost:3389"
          echo "     3. Save"
          echo ""
          echo "  Then connect to: rdp.trycloudflare.com"
          echo "========================================"

      - name: ⏳ Keep alive
        run: sleep 16200

      - name: 🔄 Trigger next
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh workflow run rdp.yml
