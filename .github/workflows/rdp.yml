name: Kavishka

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ─────────────────────────────────────────
      # SYSTEM OPTIMIZATION
      # ─────────────────────────────────────────
      - name: ⚡ Optimize system performance
        run: |
          sudo systemctl disable --now apport unattended-upgrades \
            apt-daily.timer apt-daily-upgrade.timer \
            motd-news.timer fwupd 2>/dev/null || true

          sudo sysctl -w vm.swappiness=10
          sudo sysctl -w vm.vfs_cache_pressure=50
          sudo sysctl -w net.core.rmem_max=134217728
          sudo sysctl -w net.core.wmem_max=134217728

          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "✅ Swap created: $(free -h | grep Swap)"

      # ─────────────────────────────────────────
      # CHECKOUT & GIT CONFIG
      # ─────────────────────────────────────────
      - name: 📦 Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: 🔧 Configure Git
        run: |
          git config user.name "RDP Bot"
          git config user.email "rdpbot@github.com"

      # ─────────────────────────────────────────
      # CREATE USER
      # ─────────────────────────────────────────
      - name: 👤 Create RDP user
        run: |
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:${{ secrets.RDP_PASSWORD }}" | sudo chpasswd
          sudo usermod -aG sudo rdpuser
          sudo usermod -aG audio,video rdpuser

      # ─────────────────────────────────────────
      # RESTORE BACKUP
      # ─────────────────────────────────────────
      - name: 💾 Restore previous session data
        run: |
          if [ -f "backup/rdpuser-backup.tar.gz" ]; then
            echo "✅ Backup found! Restoring..."
            sudo tar -xzf backup/rdpuser-backup.tar.gz -C /home/rdpuser/
            sudo chown -R rdpuser:rdpuser /home/rdpuser/
            echo "✅ Restore complete! Size: $(du -sh /home/rdpuser | cut -f1)"
          else
            echo "⚠️ No backup found. Starting fresh."
          fi

      # ─────────────────────────────────────────
      # INSTALL PACKAGES
      # ─────────────────────────────────────────
      - name: 📥 Install XFCE + XRDP + Tools
        run: |
          sudo apt update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            xfce4 \
            xfce4-goodies \
            xfce4-terminal \
            xrdp \
            xorgxrdp \
            dbus-x11 \
            pulseaudio \
            firefox \
            wget \
            curl \
            git \
            htop \
            neofetch \
            unzip \
            zip \
            python3 \
            python3-pip \
            nodejs \
            npm \
            fonts-noto \
            --no-install-recommends
          echo "✅ All packages installed!"

      # ─────────────────────────────────────────
      # CONFIGURE XRDP
      # ─────────────────────────────────────────
      - name: 🚀 Configure XRDP
        run: |
          sudo pkill -9 xrdp || true
          sudo pkill -9 xrdp-sesman || true
          sleep 2
          
          sudo apt install -y xrdp xorgxrdp
          sudo adduser xrdp ssl-cert || true
          sudo xrdp-keygen xrdp /etc/xrdp/key.pem /etc/xrdp/cert.pem || true
          
          sudo sed -i 's/3389/3389/g' /etc/xrdp/xrdp.ini
          sudo sed -i 's/security_layer=rdp/security_layer=rdp/g' /etc/xrdp/xrdp.ini
          sudo sed -i 's/max_bpp=32/max_bpp=24/g' /etc/xrdp/xrdp.ini
          sudo sed -i 's/crypt_level=low/crypt_level=high/g' /etc/xrdp/xrdp.ini
          sudo sed -i 's/ListenAddress=127.0.0.1/ListenAddress=0.0.0.0/g' /etc/xrdp/sesman.ini
          
          echo "xfce4-session" | sudo tee /home/rdpuser/.xsession > /dev/null
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession
          sudo chmod 644 /home/rdpuser/.xsession
          
          sudo xrdp || true
          sudo xrdp-sesman || true
          
          sleep 3
          
          echo "=== XRDP Process Check ==="
          ps aux | grep xrdp | grep -v grep
          
          echo "=== Port Check ==="
          sudo ss -tlnp | grep 3389 || echo "⚠️ Port 3389 not found"
          
          echo "✅ XRDP configuration complete"

      # ─────────────────────────────────────────
      # DYNAMIC DNS UPDATE (DUCKDNS)
      # ─────────────────────────────────────────
      - name: 🌐 Update DuckDNS with current IP
        env:
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
          DUCKDNS_DOMAIN: ${{ secrets.DUCKDNS_DOMAIN }}
        run: |
          CURRENT_IP=$(curl -s https://api.ipify.org)
          echo "📡 Current runner IP: $CURRENT_IP"
          
          RESPONSE=$(curl -s "https://www.duckdns.org/update?domains=$DUCKDNS_DOMAIN&token=$DUCKDNS_TOKEN&ip=$CURRENT_IP")
          echo "🔄 DuckDNS response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "OK"; then
            echo "✅ DDNS updated: $DUCKDNS_DOMAIN.duckdns.org → $CURRENT_IP"
          else
            echo "⚠️ DDNS update may have failed. Response: $RESPONSE"
          fi

      # ─────────────────────────────────────────
      # XFCE PERFORMANCE TWEAKS (FIXED INDENTATION)
      # ─────────────────────────────────────────
      - name: 🎨 Optimize XFCE
        run: |
          sudo -u rdpuser mkdir -p /home/rdpuser/.config/xfce4/xfconf/xfce-perchannel-xml

          cat << 'XFWM4_EOF' | sudo tee /home/rdpuser/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml > /dev/null
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="use_compositing" type="bool" value="false"/>
              <property name="frame_opacity" type="int" value="100"/>
              <property name="shadow_opacity" type="int" value="0"/>
              <property name="show_frame_shadow" type="bool" value="false"/>
              <property name="show_popup_shadow" type="bool" value="false"/>
              <property name="vblank_mode" type="string" value="off"/>
            </property>
          </channel>
          XFWM4_EOF

          cat << 'XSETTINGS_EOF' | sudo tee /home/rdpuser/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml > /dev/null
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Greybird"/>
              <property name="IconThemeName" type="string" value="elementary-xfce"/>
            </property>
            <property name="Gtk" type="empty">
              <property name="EnableAnimations" type="bool" value="false"/>
              <property name="CursorThemeSize" type="int" value="16"/>
            </property>
          </channel>
          XSETTINGS_EOF

          sudo chown -R rdpuser:rdpuser /home/rdpuser/.config
          echo "✅ XFCE optimized!"

      # ─────────────────────────────────────────
      # SHOW CONNECTION INFO
      # ─────────────────────────────────────────
      - name: 📋 Connection Info
        env:
          DUCKDNS_DOMAIN: ${{ secrets.DUCKDNS_DOMAIN }}
        run: |
          CURRENT_IP=$(curl -s https://api.ipify.org)
          echo "========================================"
          echo "  🖥️  RDP CONNECTION DETAILS"
          echo "========================================"
          echo "  🌐 DDNS HOST : ${DUCKDNS_DOMAIN}.duckdns.org"
          echo "  📡 CURRENT IP: $CURRENT_IP"
          echo "  👤 USERNAME  : rdpuser"
          echo "  🔑 PASSWORD  : (from secrets.RDP_PASSWORD)"
          echo "  🔌 PORT      : 3389"
          echo "========================================"
          echo "  ⚠️ Wait 1-2 min for DNS propagation"
          echo "========================================"
          echo "  💡 Windows: mstsc → ${DUCKDNS_DOMAIN}.duckdns.org:3389"
          echo "  💡 Linux: xfreerdp /v:${DUCKDNS_DOMAIN}.duckdns.org:3389 /u:rdpuser"
          echo "========================================"
          echo "  XRDP : $(sudo systemctl is-active xrdp || echo 'manual')"
          echo "  RAM  : $(free -h | grep Mem | awk '{print $3"/"$2}')"
          echo "  CPU  : $(nproc) cores"
          echo "========================================"

      # ─────────────────────────────────────────
      # SESSION (4h 30min then backup)
      # ─────────────────────────────────────────
      - name: ⏳ Active session (4h 30min)
        run: sleep 16200

      # ─────────────────────────────────────────
      # BACKUP TO REPO
      # ─────────────────────────────────────────
      - name: 💾 Backup user data to repo
        run: |
          echo "💾 Starting backup..."
          mkdir -p backup

          sudo tar -czf backup/rdpuser-backup.tar.gz \
            -C /home/rdpuser . \
            --exclude='.cache' \
            --exclude='.mozilla/firefox/*/cache2' \
            --exclude='.config/google-chrome/Default/Cache' \
            --exclude='*.log' \
            --exclude='.local/share/recently-used.xbel' \
            --exclude='__pycache__' \
            --exclude='node_modules' \
            --exclude='.npm' \
            2>/dev/null

          BACKUP_SIZE=$(du -sh backup/rdpuser-backup.tar.gz | cut -f1)
          echo "✅ Backup complete! Size: $BACKUP_SIZE"

      - name: 📤 Push backup to GitHub
        run: |
          git add backup/rdpuser-backup.tar.gz
          if git diff --staged --quiet; then
            echo "⚠️ No changes to backup."
          else
            git commit -m "💾 Auto backup - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD
            echo "✅ Backup pushed successfully!"
          fi

      # ─────────────────────────────────────────
      # TRIGGER NEXT RUN
      # ─────────────────────────────────────────
      - name: 🔄 Trigger next session
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run rdp.yml
          echo "✅ Next session triggered!"
          echo "⏳ New RDP ready in ~3 minutes..."
