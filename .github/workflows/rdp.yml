name: Windows 11 RDP + Exit Node

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      # ─────────────────────────────────────────
      # SYSTEM INFO
      # ─────────────────────────────────────────
      - name: System Info
        shell: powershell
        run: |
          $os = (Get-WmiObject Win32_OperatingSystem).Caption
          $ram = [math]::Round((Get-WmiObject Win32_ComputerSystem).TotalPhysicalMemory/1GB, 2)
          Write-Host "========================================"
          Write-Host "Windows: $os"
          Write-Host "CPU Cores: $env:NUMBER_OF_PROCESSORS"
          Write-Host "RAM: $ram GB"
          Write-Host "========================================"

      # ─────────────────────────────────────────
      # CHECKOUT REPO
      # ─────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "RDP Bot"
          git config user.email "rdpbot@github.com"

      # ─────────────────────────────────────────
      # DISABLE PASSWORD POLICY
      # ─────────────────────────────────────────
      - name: Disable password policy
        shell: powershell
        run: |
          Write-Host "Disabling password complexity..."
          secedit /export /cfg C:\secpol.cfg /quiet
          $content = Get-Content C:\secpol.cfg
          $content = $content -replace "PasswordComplexity\s*=\s*\d", "PasswordComplexity = 0"
          $content = $content -replace "MinimumPasswordLength\s*=\s*\d+", "MinimumPasswordLength = 1"
          $content = $content -replace "PasswordHistorySize\s*=\s*\d+", "PasswordHistorySize = 0"
          $content = $content -replace "MaximumPasswordAge\s*=\s*\d+", "MaximumPasswordAge = -1"
          $content | Set-Content C:\secpol.cfg
          secedit /configure /db C:\Windows\security\local.sdb /cfg C:\secpol.cfg /quiet
          Write-Host "Password policy disabled!"

      # ─────────────────────────────────────────
      # CREATE USER KAVISHKA
      # ─────────────────────────────────────────
      - name: Create user kavishka
        shell: cmd
        run: |
          echo Deleting old user if exists...
          net user kavishka /delete >nul 2>&1

          echo Creating user kavishka...
          net user kavishka "${{ secrets.RDP_PASSWORD }}" /add /y
          if %errorlevel% neq 0 (
            echo FAILED to create user!
            exit /b 1
          )

          echo Adding to Administrators...
          net localgroup Administrators kavishka /add >nul 2>&1

          echo Adding to Remote Desktop Users...
          net localgroup "Remote Desktop Users" kavishka /add >nul 2>&1

          echo Setting account to never expire...
          net user kavishka /expires:never >nul 2>&1
          net user kavishka /active:yes >nul 2>&1
          wmic useraccount where "name='kavishka'" set PasswordExpires=FALSE >nul 2>&1

          echo ========================================
          echo User kavishka created successfully!
          echo ========================================
          net user kavishka

      # ─────────────────────────────────────────
      # RESTORE BACKUP
      # ─────────────────────────────────────────
      - name: Restore previous session data
        shell: powershell
        run: |
          if (Test-Path "backup\userdata.zip") {
            Write-Host "Backup found! Restoring..."
            New-Item -ItemType Directory -Force -Path "C:\Users\kavishka" | Out-Null
            Expand-Archive -Path "backup\userdata.zip" `
              -DestinationPath "C:\Users\kavishka\" -Force
            Write-Host "Restore complete!"
          } else {
            Write-Host "No backup found. Starting fresh."
          }

      # ─────────────────────────────────────────
      # ENABLE RDP
      # ─────────────────────────────────────────
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "SecurityLayer" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService

          Write-Host "RDP Enabled!"
          Write-Host "RDP Service: $((Get-Service TermService).Status)"

      # ─────────────────────────────────────────
      # CREATE SHARED FOLDER (FIXED with net share)
      # ─────────────────────────────────────────
      - name: Create shared folder
        shell: powershell
        run: |
          Write-Host "Creating shared folder for file transfer..."
          
          # Create folder
          New-Item -ItemType Directory -Force -Path "C:\Transfer" | Out-Null
          
          # Remove existing share if exists
          net share Transfer /delete 2>$null
          
          # Share using net share (compatible with GitHub runners)
          net share Transfer=C:\Transfer /GRANT:Everyone,FULL
          
          # Set NTFS permissions
          icacls "C:\Transfer" /grant "Everyone:(OI)(CI)F" /T | Out-Null
          
          # Allow SMB through firewall (restrict to Tailscale subnet)
          netsh advfirewall firewall add rule name="Allow SMB Tailscale" `
            dir=in action=allow protocol=TCP localport=445 remoteip=100.64.0.0/10 2>$null
          
          # Verify
          net share Transfer
          Write-Host "Shared folder ready: \\TAILSCALE_IP\Transfer"

      # ─────────────────────────────────────────
      # INSTALL TAILSCALE
      # ─────────────────────────────────────────
      - name: Install Tailscale
        shell: powershell
        run: |
          Write-Host "Downloading Tailscale..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe"
          $out = Join-Path $env:TEMP "tailscale-setup.exe"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          
          Write-Host "Installing..."
          $proc = Start-Process -FilePath $out `
            -ArgumentList "/S" `
            -Wait -PassThru -NoNewWindow
          
          Write-Host "Exit code: $($proc.ExitCode)"
          Start-Sleep -Seconds 15
          
          if (Test-Path "C:\Program Files\Tailscale\tailscale.exe") {
            Write-Host "Tailscale installed OK!"
          } else {
            Write-Host "ERROR: Tailscale not found!"
            exit 1
          }

      # ─────────────────────────────────────────
      # CONNECT TAILSCALE + ADVERTISE EXIT NODE
      # ─────────────────────────────────────────
      - name: Connect Tailscale + Enable Exit Node
        shell: powershell
        run: |
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          $tsKey = "${{ secrets.TS_AUTHKEY }}"

          Write-Host "Connecting to Tailscale and advertising as Exit Node..."
          
          & $tsExe up `
            --authkey=$tsKey `
            --hostname="github-rdp" `
            --accept-routes `
            --advertise-exit-node `
            --advertise-routes=100.64.0.0/10

          Start-Sleep -Seconds 20

          # Get Tailscale IP
          $tsIP = (& $tsExe ip -4).Trim()
          
          # Get public IP
          $publicIP = (Invoke-RestMethod -Uri "https://ifconfig.me/ip").Trim()

          Write-Host "========================================"
          Write-Host "  TAILSCALE CONNECTED + EXIT NODE READY"
          Write-Host "========================================"
          Write-Host "  TAILSCALE IP   : $tsIP"
          Write-Host "  PUBLIC IP      : $publicIP"
          Write-Host "  USERNAME       : kavishka"
          Write-Host "  PASSWORD       : your RDP_PASSWORD secret"
          Write-Host "  RDP PORT       : 3389"
          Write-Host "  SMB SHARE      : \\$tsIP\Transfer"
          Write-Host "========================================"

          # Save info
          Set-Content -Path "rdp-info.txt" -Value "RDP_IP=$tsIP"
          Add-Content -Path "rdp-info.txt" -Value "PUBLIC_IP=$publicIP"
          Add-Content -Path "rdp-info.txt" -Value "USERNAME=kavishka"
          Add-Content -Path "rdp-info.txt" -Value "PASSWORD=${{ secrets.RDP_PASSWORD }}"
          Add-Content -Path "rdp-info.txt" -Value "RDP_PORT=3389"
          Add-Content -Path "rdp-info.txt" -Value "SMB_SHARE=\\$tsIP\Transfer"
          Add-Content -Path "rdp-info.txt" -Value "STARTED=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') UTC"
          Add-Content -Path "rdp-info.txt" -Value "EXPIRES=$((Get-Date).AddHours(5).ToString('yyyy-MM-dd HH:mm:ss')) UTC"
          Add-Content -Path "rdp-info.txt" -Value ""
          Add-Content -Path "rdp-info.txt" -Value "HOW TO USE:"
          Add-Content -Path "rdp-info.txt" -Value "1. FILE TRANSFER: Win+R -> \\$tsIP\Transfer"
          Add-Content -Path "rdp-info.txt" -Value "2. EXIT NODE: tailscale up --exit-node=$tsIP"
          Add-Content -Path "rdp-info.txt" -Value "3. RDP: mstsc -> $tsIP -> kavishka"

      # ─────────────────────────────────────────
      # GET OAUTH TOKEN (Option B)
      # ─────────────────────────────────────────
      - name: Get Tailscale OAuth Token
        shell: powershell
        id: oauth
        run: |
          Write-Host "Obtaining OAuth token..."
          
          $clientId = "${{ secrets.TS_CLIENT_ID }}"
          $clientSecret = "${{ secrets.TS_CLIENT_SECRET }}"
          
          if ([string]::IsNullOrEmpty($clientId) -or [string]::IsNullOrEmpty($clientSecret)) {
            Write-Host "Warning: TS_CLIENT_ID or TS_CLIENT_SECRET not set. Skipping auto-approve."
            echo "oauth_token=" >> $env:GITHUB_OUTPUT
            exit 0
          }
          
          try {
            $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$clientId:$clientSecret"))
            
            $headers = @{
                "Authorization" = "Basic $base64"
                "Content-Type" = "application/x-www-form-urlencoded"
            }
            
            $body = "grant_type=client_credentials&scope=device"
            
            $response = Invoke-RestMethod `
                -Uri "https://login.tailscale.com/api/v2/oauth/token" `
                -Headers $headers `
                -Method POST `
                -Body $body
            
            $token = $response.access_token
            echo "oauth_token=$token" >> $env:GITHUB_OUTPUT
            Write-Host "OAuth token obtained successfully!"
          }
          catch {
            Write-Host "Warning: Failed to obtain OAuth token."
            Write-Host "Error: $($_.Exception.Message)"
            echo "oauth_token=" >> $env:GITHUB_OUTPUT
          }

      # ─────────────────────────────────────────
      # APPROVE EXIT NODE
      # ─────────────────────────────────────────
      - name: Approve Exit Node in Tailscale
        shell: powershell
        if: ${{ steps.oauth.outputs.oauth_token != '' }}
        run: |
          Write-Host "Approving Exit Node in Tailscale admin..."
          
          $headers = @{
              "Authorization" = "Bearer ${{ steps.oauth.outputs.oauth_token }}"
              "Content-Type" = "application/json"
          }
          
          try {
            $nodes = Invoke-RestMethod `
                -Uri "https://api.tailscale.com/api/v2/tailnet/_/devices" `
                -Headers $headers `
                -Method GET
            
            $rdpNode = $nodes.devices | Where-Object { $_.name -eq "github-rdp" }
            
            if ($rdpNode) {
                Write-Host "Found node: $($rdpNode.name) (ID: $($rdpNode.id))"
                
                $body = @{
                    routes = @{
                        "$($rdpNode.id)" = @{
                            "0.0.0.0/0" = $true
                        }
                    }
                } | ConvertTo-Json -Depth 3
                
                Invoke-RestMethod `
                    -Uri "https://api.tailscale.com/api/v2/tailnet/_/devices/$($rdpNode.id)/routes" `
                    -Headers $headers `
                    -Method POST `
                    -Body $body
                
                Write-Host "Exit Node approved successfully!"
            } else {
                Write-Host "Warning: Could not find node 'github-rdp'"
                Write-Host "Please approve manually at: https://login.tailscale.com/admin/machines"
            }
          }
          catch {
            Write-Host "Warning: Failed to auto-approve exit node."
            Write-Host "Error: $($_.Exception.Message)"
            Write-Host "Please approve manually at: https://login.tailscale.com/admin/machines"
          }

      # ─────────────────────────────────────────
      # PUSH RDP INFO
      # ─────────────────────────────────────────
      - name: Push RDP info to repo
        shell: bash
        run: |
          git add rdp-info.txt
          git diff --staged --quiet || git commit -m "RDP IP updated - $(date)"
          git push origin HEAD || true

      # ─────────────────────────────────────────
      # CONNECTION DETAILS
      # ─────────────────────────────────────────
      - name: Connection Details
        shell: powershell
        run: |
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          $tsIP  = (& $tsExe ip -4).Trim()
          $ram   = [math]::Round((Get-WmiObject Win32_ComputerSystem).TotalPhysicalMemory/1GB, 2)
          $disk  = [math]::Round((Get-PSDrive C).Free/1GB, 2)
          
          Write-Host ""
          Write-Host "========================================"
          Write-Host "  WINDOWS RDP + EXIT NODE - READY!"
          Write-Host "========================================"
          Write-Host "  TAILSCALE IP : $tsIP"
          Write-Host "  USERNAME     : kavishka"
          Write-Host "  PASSWORD     : (your RDP_PASSWORD secret)"
          Write-Host "========================================"
          Write-Host "  📁 FILE TRANSFER (Zero Internet):"
          Write-Host "     Win+R -> \\$tsIP\Transfer"
          Write-Host "     Login: kavishka / (RDP_PASSWORD)"
          Write-Host "  🌐 EXIT NODE (Use VM Internet):"
          Write-Host "     tailscale up --exit-node=$tsIP"
          Write-Host "  🖥️  RDP ACCESS:"
          Write-Host "     mstsc -> Computer: $tsIP"
          Write-Host "========================================"
          Write-Host "  VM SPECS: $ram GB RAM | $env:NUMBER_OF_PROCESSORS Cores | $disk GB Free"
          Write-Host "========================================"

      # ─────────────────────────────────────────
      # SESSION 4h 30min
      # ─────────────────────────────────────────
      - name: Active session 4h 30min
        shell: powershell
        run: |
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          $tsIP = (& $tsExe ip -4).Trim()
          
          Write-Host "⏰ Session active for 4h 30min..."
          Write-Host "💡 File share: \\$tsIP\Transfer"
          Write-Host "💡 Exit node: tailscale up --exit-node=$tsIP"
          
          for ($i = 1; $i -le 270; $i++) {
            if ($i % 30 -eq 0) {
              Write-Host "⏳ ${i}min elapsed - Share: \\$tsIP\Transfer"
              $status = & $tsExe status 2>&1
              if ($LASTEXITCODE -ne 0) {
                Write-Host "⚠️  Warning: Tailscale may be disconnected"
              }
            }
            Start-Sleep -Seconds 60
          }
          Write-Host "Session completed"

      # ─────────────────────────────────────────
      # BACKUP
      # ─────────────────────────────────────────
      - name: Backup user data
        shell: powershell
        run: |
          Write-Host "Starting backup..."
          New-Item -ItemType Directory -Force -Path "backup" | Out-Null
          
          if (Test-Path "C:\Transfer") {
            $transferItems = Get-ChildItem "C:\Transfer" -ErrorAction SilentlyContinue
            if ($transferItems) {
              Compress-Archive -Path "C:\Transfer\*" `
                -DestinationPath "backup\transfer.zip" -Force
            }
          }
          
          $items = @(
            "C:\Users\kavishka\Desktop",
            "C:\Users\kavishka\Documents",
            "C:\Users\kavishka\Downloads"
          )
          $existing = $items | Where-Object { Test-Path $_ }
          
          if ($existing.Count -gt 0) {
            Compress-Archive -Path $existing `
              -DestinationPath "backup\userdata.zip" -Force
            $size = [math]::Round((Get-Item "backup\userdata.zip").Length/1MB, 2)
            Write-Host "Backup complete! Size: $size MB"
          } else {
            Write-Host "No user data to backup yet."
          }

      - name: Push backup to GitHub
        shell: bash
        run: |
          git add backup/ rdp-info.txt 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "Auto backup - $(date '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin HEAD || true

      # ─────────────────────────────────────────
      # TRIGGER NEXT RUN
      # ─────────────────────────────────────────
      - name: Trigger next session
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run "${{ github.workflow }}"
          echo "Next session triggered!"
          echo "Windows RDP ready again in about 3 minutes!"
