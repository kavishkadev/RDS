name: Kavishka

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ─────────────────────────────────────────
      # SYSTEM OPTIMIZATION
      # ─────────────────────────────────────────
      - name: ⚡ Optimize system
        run: |
          sudo systemctl disable --now apport unattended-upgrades apt-daily.timer apt-daily-upgrade.timer motd-news.timer 2>/dev/null || true
          sudo swapoff -a || true

      # ─────────────────────────────────────────
      # CHECKOUT & GIT CONFIG
      # ─────────────────────────────────────────
      - name: 📦 Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: 🔧 Configure Git
        run: |
          git config user.name "RDP Bot"
          git config user.email "rdp@github.com"

      # ─────────────────────────────────────────
      # CREATE USER
      # ─────────────────────────────────────────
      - name: 👤 Create RDP user
        run: |
          sudo useradd -m -s /bin/bash kavishka
          echo "kavishka:${{ secrets.RDP_PASSWORD }}" | sudo chpasswd
          sudo usermod -aG sudo kavishka
          sudo usermod -aG audio,video kavishka

      # ─────────────────────────────────────────
      # RESTORE BACKUP
      # ─────────────────────────────────────────
      - name: 💾 Restore backup
        run: |
          if [ -f "backup/kavishka-backup.tar.gz" ]; then
            sudo tar -xzf backup/kavishka-backup.tar.gz -C /home/kavishka/
            sudo chown -R kavishka:kavishka /home/kavishka/
          fi

      # ─────────────────────────────────────────
      # INSTALL DESKTOP + XRDP
      # ─────────────────────────────────────────
      - name: 📥 Install XFCE + XRDP + Win11 Theme Tools
        run: |
          sudo apt update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            xfce4 \
            xfce4-goodies \
            xfce4-whiskermenu-plugin \
            xrdp \
            xorgxrdp \
            dbus-x11 \
            pulseaudio \
            firefox \
            wget \
            curl \
            git \
            htop \
            neofetch \
            unzip \
            fonts-noto \
            --no-install-recommends
          echo "✅ Desktop packages installed!"

      # ─────────────────────────────────────────
      # FIX XRDP SESSION ERROR + APPLY WIN11 THEME
      # ─────────────────────────────────────────
      - name: 🎨 Configure XRDP + Windows 11 Theme
        run: |
          # ── Fix the "failsafe session" error ──
          sudo pkill -9 xrdp || true
          sudo pkill -9 xrdp-sesman || true
          sleep 2

          # Create proper .xsession (THIS FIXES YOUR ERROR)
          cat << 'EOF' | sudo tee /home/kavishka/.xsession > /dev/null
          #!/bin/sh
          export XDG_CONFIG_DIRS=/etc/xdg:/usr/local/etc/xdg
          export XDG_DATA_DIRS=/usr/local/share:/usr/share:/var/lib/snapd/desktop
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          sudo chown kavishka:kavishka /home/kavishka/.xsession
          sudo chmod 755 /home/kavishka/.xsession

          # ── Download & apply Windows 11 theme for XFCE ──
          mkdir -p /home/kavishka/.themes /home/kavishka/.icons /home/kavishka/.local/share/fonts
          
          # Win11 GTK Theme
          wget -q -O /tmp/win11-theme.zip https://github.com/B00merang-Artwork/Windows-11/archive/refs/heads/master.zip
          unzip -q /tmp/win11-theme.zip -d /tmp/
          mv /tmp/Windows-11-master /home/kavishka/.themes/Windows-11
          
          # Win11 Icons
          wget -q -O /tmp/win11-icons.zip https://github.com/B00merang-Artwork/Windows-11/archive/refs/heads/icons.zip
          unzip -q /tmp/win11-icons.zip -d /tmp/
          mv /tmp/icons-master /home/kavishka/.icons/Windows-11
          
          # Win11 Cursors
          wget -q -O /tmp/win11-cursors.zip https://github.com/B00merang-Artwork/Windows-11/archive/refs/heads/cursors.zip
          unzip -q /tmp/win11-cursors.zip -d /tmp/
          mv /tmp/cursors-master /home/kavishka/.icons/Windows-11-Cursors
          
          sudo chown -R kavishka:kavishka /home/kavishka/.themes /home/kavishka/.icons

          # Apply theme via xfconf
          sudo -u kavishka xfconf-query -c xsettings -p /Net/ThemeName -s "Windows-11" || true
          sudo -u kavishka xfconf-query -c xsettings -p /Net/IconThemeName -s "Windows-11" || true
          sudo -u kavishka xfconf-query -c xsettings -p /Gtk/CursorThemeName -s "Windows-11-Cursors" || true

          # Configure panel to look like Windows 11 taskbar
          sudo -u kavishka xfconf-query -c xfce4-panel -p /panels -t empty -a -n -s 0 || true
          sudo -u kavishka xfconf-query -c xfce4-panel -p /panels/panel-0/position -s "p=8;x=0;y=0" || true
          sudo -u kavishka xfconf-query -c xfce4-panel -p /panels/panel-0/length -n 100 || true
          sudo -u kavishka xfconf-query -c xfce4-panel -p /panels/panel-0/position-locked -n true || true
          sudo -u kavishka xfconf-query -c xfce4-panel -p /panels/panel-0/disable-struts -n false || true

          # Start XRDP
          sudo xrdp || true
          sudo xrdp-sesman || true
          sleep 3

          echo "✅ XRDP fixed & Windows 11 theme applied!"

      # ─────────────────────────────────────────
      # SETUP TAILSCALE
      # ─────────────────────────────────────────
      - name: 🌐 Setup Tailscale
        env:
          TS_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey $TS_AUTH_KEY --accept-routes --hostname "ubuntu-win11-rdp"
          
          TAILSCALE_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV
          echo "✅ Tailscale connected! IP: $TAILSCALE_IP"

      # ─────────────────────────────────────────
      # SHOW CONNECTION INFO
      # ─────────────────────────────────────────
      - name: 📋 Connection Info
        run: |
          echo "========================================"
          echo "  🖥️  RDP CONNECTION DETAILS"
          echo "========================================"
          echo "  🌐 TAILSCALE IP: ${{ env.TAILSCALE_IP }}"
          echo "  👤 USERNAME  : kavishka"
          echo "  🔑 PASSWORD  : (from secrets)"
          echo "  🔌 PORT      : 3389"
          echo "========================================"
          echo "  💡 HOW TO CONNECT:"
          echo "  1. Install Tailscale on your device"
          echo "  2. Sign in with same account"
          echo "  3. Open Remote Desktop (mstsc)"
          echo "  4. Connect to: ${{ env.TAILSCALE_IP }}"
          echo "  5. Login: kavishka / your password"
          echo "========================================"
          echo "  🎨 Desktop: Ubuntu + Windows 11 Theme"
          echo "  ⏳ Session: 4h 30min | Auto-restart: Yes"
          echo "========================================"

      # ─────────────────────────────────────────
      # KEEP ALIVE & BACKUP
      # ─────────────────────────────────────────
      - name: ⏳ Keep alive (4h 30min)
        run: sleep 16200

      - name: 💾 Backup
        run: |
          mkdir -p backup
          sudo tar -czf backup/kavishka-backup.tar.gz -C /home/kavishka . \
            --exclude='.cache' --exclude='*.log' --exclude='__pycache__' 2>/dev/null
          git add backup/
          git commit -m "💾 Backup $(date +%Y-%m-%d)" || true
          git push origin HEAD || true

      - name: 🔄 Trigger next
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh workflow run rdp.yml
