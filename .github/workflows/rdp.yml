name: Windows 11

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      # ─────────────────────────────────────────
      # SHOW SYSTEM INFO
      # ─────────────────────────────────────────
      - name: 💻 System Info
        run: |
          Write-Host "========================================"
          Write-Host "  Windows Version:"
          (Get-WmiObject Win32_OperatingSystem).Caption
          Write-Host "  CPU Cores: $env:NUMBER_OF_PROCESSORS"
          Write-Host "  RAM: $([math]::Round((Get-WmiObject Win32_ComputerSystem).TotalPhysicalMemory/1GB, 2)) GB"
          Write-Host "========================================"
        shell: powershell

      # ─────────────────────────────────────────
      # CHECKOUT REPO
      # ─────────────────────────────────────────
      - name: 📦 Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: 🔧 Configure Git
        run: |
          git config user.name "RDP Bot"
          git config user.email "rdpbot@github.com"
        shell: bash

      # ─────────────────────────────────────────
      # RESTORE BACKUP
      # ─────────────────────────────────────────
      - name: 💾 Restore previous session data
        run: |
          if (Test-Path "backup\userdata.zip") {
            Write-Host "✅ Backup found! Restoring..."
            Expand-Archive -Path "backup\userdata.zip" `
              -DestinationPath "C:\Users\runneradmin\" `
              -Force
            Write-Host "✅ Restore complete!"
          } else {
            Write-Host "⚠️ No backup found. Starting fresh."
          }
        shell: powershell

      # ─────────────────────────────────────────
      # SET RDP PASSWORD
      # ─────────────────────────────────────────
      - name: 🔐 Set RDP credentials
        run: |
          # Set password for runneradmin (built-in admin account)
          $password = "${{ secrets.RDP_PASSWORD }}"
          net user runneradmin $password
          Write-Host "✅ Password set for runneradmin"

          # Make sure account is enabled
          net user runneradmin /active:yes
          Write-Host "✅ Account enabled"
        shell: powershell

      # ─────────────────────────────────────────
      # ENABLE & CONFIGURE RDP
      # ─────────────────────────────────────────
      - name: 🖥️ Enable RDP
        run: |
          # Enable Remote Desktop
          Set-ItemProperty -Path `
            'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -name "fDenyTSConnections" -Value 0

          # Enable RDP through firewall
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Allow RDP without Network Level Authentication
          Set-ItemProperty -Path `
            'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -name "UserAuthentication" -Value 0

          # Enable Remote Desktop service
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService

          Write-Host "✅ RDP Enabled!"
          Write-Host "✅ RDP Service: $((Get-Service TermService).Status)"
        shell: powershell

      # ─────────────────────────────────────────
      # INSTALL TAILSCALE
      # ─────────────────────────────────────────
      - name: 🌐 Install Tailscale
        run: |
          # Download Tailscale installer
          Write-Host "📥 Downloading Tailscale..."
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" `
            -OutFile "tailscale-setup.exe"

          # Install silently
          Write-Host "⚙️ Installing Tailscale..."
          Start-Process -FilePath "tailscale-setup.exe" `
            -ArgumentList "/S" `
            -Wait -NoNewWindow

          Write-Host "✅ Tailscale installed!"
        shell: powershell

      - name: 🔗 Connect Tailscale (fixed IP)
        run: |
          # Start Tailscale with auth key
          $tsKey = "${{ secrets.TS_AUTHKEY }}"

          # Connect to Tailscale network
          & "C:\Program Files\Tailscale\tailscale.exe" up `
            --authkey=$tsKey `
            --hostname="github-rdp" `
            --accept-routes

          Start-Sleep -Seconds 10

          # Get Tailscale IP
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "========================================"
          Write-Host "  ✅ Tailscale Connected!"
          Write-Host "  🔗 YOUR FIXED RDP IP: $tsIP"
          Write-Host "  👤 USERNAME: runneradmin"
          Write-Host "  🔑 PASSWORD: (your RDP_PASSWORD secret)"
          Write-Host "  🖥️  Open mstsc → Computer: $tsIP"
          Write-Host "========================================"

          # Save IP to file for reference
          $tsIP | Out-File -FilePath "rdp-info.txt"
          "USERNAME=runneradmin" | Add-Content "rdp-info.txt"
          "STARTED=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')" | `
            Add-Content "rdp-info.txt"
          "EXPIRES=$(
            (Get-Date).AddHours(5).ToString('yyyy-MM-dd HH:mm:ss UTC')
          )" | Add-Content "rdp-info.txt"
        shell: powershell

      # ─────────────────────────────────────────
      # PUSH RDP INFO TO REPO
      # ─────────────────────────────────────────
      - name: 📝 Push RDP info to repo
        run: |
          git add rdp-info.txt
          git diff --staged --quiet || git commit -m "🔗 RDP IP - $(date)"
          git push origin HEAD || true
        shell: bash

      # ─────────────────────────────────────────
      # SHOW FULL CONNECTION DETAILS
      # ─────────────────────────────────────────
      - name: 📋 Connection Details
        run: |
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "========================================"
          Write-Host "  🖥️  WINDOWS 11 RDP DETAILS"
          Write-Host "========================================"
          Write-Host "  IP       : $tsIP"
          Write-Host "  USERNAME : runneradmin"
          Write-Host "  PASSWORD : (your RDP_PASSWORD secret)"
          Write-Host "  PORT     : 3389"
          Write-Host "========================================"
          Write-Host "  HOW TO CONNECT:"
          Write-Host "  1. Make sure Tailscale is running on YOUR PC"
          Write-Host "  2. Win+R → type: mstsc → Enter"
          Write-Host "  3. Computer: $tsIP"
          Write-Host "  4. Username: runneradmin"
          Write-Host "  5. Password: your RDP_PASSWORD"
          Write-Host "========================================"
          Write-Host "  ✅ IP is FIXED - same every restart!"
          Write-Host "  ✅ Session auto-restarts every 5 hours"
          Write-Host "  ✅ Files backed up on each restart"
          Write-Host "========================================"
          Write-Host "  RAM  : $([math]::Round((Get-WmiObject Win32_ComputerSystem).TotalPhysicalMemory/1GB,2)) GB"
          Write-Host "  CPU  : $env:NUMBER_OF_PROCESSORS cores"
          Write-Host "  DISK : $([math]::Round((Get-PSDrive C).Free/1GB,2)) GB free"
          Write-Host "========================================"
        shell: powershell

      # ─────────────────────────────────────────
      # SESSION (4h 30min)
      # ─────────────────────────────────────────
      - name: ⏳ Active session (4h 30min)
        run: Start-Sleep -Seconds 16200
        shell: powershell

      # ─────────────────────────────────────────
      # BACKUP TO REPO
      # ─────────────────────────────────────────
      - name: 💾 Backup user data
        run: |
          Write-Host "💾 Starting backup..."
          New-Item -ItemType Directory -Force -Path "backup" | Out-Null

          # Backup Desktop, Documents, Downloads
          $items = @(
            "C:\Users\runneradmin\Desktop",
            "C:\Users\runneradmin\Documents",
            "C:\Users\runneradmin\Downloads",
            "C:\Users\runneradmin\AppData\Roaming\Microsoft\Windows\Recent"
          )

          # Only include existing paths
          $existing = $items | Where-Object { Test-Path $_ }

          if ($existing.Count -gt 0) {
            Compress-Archive -Path $existing `
              -DestinationPath "backup\userdata.zip" `
              -Force
            $size = [math]::Round(
              (Get-Item "backup\userdata.zip").Length/1MB, 2
            )
            Write-Host "✅ Backup complete! Size: $size MB"
          } else {
            Write-Host "⚠️ No user data to backup."
          }
        shell: powershell

      - name: 📤 Push backup to GitHub
        run: |
          git add backup/userdata.zip rdp-info.txt 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "💾 Auto backup - $(date '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin HEAD || true
        shell: bash

      # ─────────────────────────────────────────
      # TRIGGER NEXT RUN
      # ─────────────────────────────────────────
      - name: 🔄 Trigger next session
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run rdp.yml
          echo "✅ Next session triggered!"
          echo "⏳ Windows RDP ready again in ~3 minutes!"
        shell: bash
