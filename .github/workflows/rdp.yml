name: Kavishka

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: ⚡ Optimize system
        run: |
          sudo systemctl disable --now apport unattended-upgrades apt-daily.timer apt-daily-upgrade.timer motd-news.timer 2>/dev/null || true
          sudo swapoff -a || true

      - name: 📦 Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: 🔧 Configure Git
        run: |
          git config user.name "RDP Bot"
          git config user.email "rdp@github.com"

      - name: 👤 Create RDP user
        run: |
          sudo useradd -m -s /bin/bash kavishka
          echo "kavishka:${{ secrets.RDP_PASSWORD }}" | sudo chpasswd
          sudo usermod -aG sudo kavishka
          sudo usermod -aG audio,video,input kavishka

      - name: 💾 Restore backup
        run: |
          if [ -f "backup/kavishka-backup.tar.gz" ]; then
            sudo tar -xzf backup/kavishka-backup.tar.gz -C /home/kavishka/
            sudo chown -R kavishka:kavishka /home/kavishka/
          fi

      # ─────────────────────────────────────────
      # INSTALL DESKTOP (COMPLETE FIX)
      # ─────────────────────────────────────────
      - name: 📥 Install XFCE + XRDP with all dependencies
        run: |
          sudo apt update -qq
          
          # Install XFCE with ALL required components
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            xfce4 \
            xfce4-goodies \
            xfce4-session \
            xfce4-settings \
            xfce4-panel \
            xfce4-whiskermenu-plugin \
            xfconf \
            xrdp \
            xorgxrdp \
            dbus-x11 \
            dbus \
            pulseaudio \
            gnome-keyring \
            policykit-1 \
            gvfs \
            gvfs-backends \
            gvfs-fuse \
            light-locker \
            firefox \
            wget \
            curl \
            git \
            htop \
            neofetch \
            unzip \
            fonts-noto \
            --no-install-recommends
          
          echo "✅ All packages installed!"

      # ─────────────────────────────────────────
      # FIX XRDP SESSION (COMPLETE REWRITE)
      # ─────────────────────────────────────────
      - name: 🚀 Fix XRDP Session (Complete Rewrite)
        run: |
          # Kill any existing processes
          sudo pkill -9 xrdp || true
          sudo pkill -9 xrdp-sesman || true
          sleep 2
          
          # ── FIX 1: Create proper .xsession ──
          cat << 'EOF' | sudo tee /home/kavishka/.xsession > /dev/null
          #!/bin/bash
          # Export necessary environment variables
          export XDG_CONFIG_DIRS=/etc/xdg:/usr/local/etc/xdg
          export XDG_DATA_DIRS=/usr/local/share:/usr/share:/var/lib/snapd/desktop
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
          export GTK_MODULES=gail:atk-bridge
          export GTK_IM_MODULE=ibus
          export QT_IM_MODULE=ibus
          export XMODIFIERS=@im=ibus
          
          # Create runtime directory if it doesn't exist
          mkdir -p $XDG_RUNTIME_DIR
          chmod 700 $XDG_RUNTIME_DIR
          
          # Start D-Bus session
          if [ -z "$DBUS_SESSION_BUS_ADDRESS" ]; then
            eval $(dbus-launch --sh-syntax)
          fi
          
          # Start GNOME keyring
          eval $(gnome-keyring-daemon --start --components=gpg,pkcs11,secrets,ssh)
          
          # Unset session manager to prevent conflicts
          unset SESSION_MANAGER
          
          # Start XFCE4 session
          exec /usr/bin/xfce4-session
          EOF
          
          sudo chown kavishka:kavishka /home/kavishka/.xsession
          sudo chmod 755 /home/kavishka/.xsession
          
          # ── FIX 2: Configure XRDP properly ──
          sudo sed -i 's/max_bpp=32/max_bpp=24/g' /etc/xrdp/xrdp.ini
          sudo sed -i 's/crypt_level=low/crypt_level=high/g' /etc/xrdp/xrdp.ini
          sudo sed -i 's/security_layer=rdp/security_layer=rdp/g' /etc/xrdp/xrdp.ini
          
          # ── FIX 3: Allow user to run XFCE ──
          echo "allowed_users=anybody" | sudo tee /etc/X11/Xwrapper.config
          
          # ── FIX 4: Create D-Bus machine ID ──
          sudo dbus-uuidgen --ensure=/etc/machine-id
          
          # ── FIX 5: Start XRDP with proper environment ──
          sudo systemctl start dbus || true
          
          # Start xrdp-sesman first
          sudo /usr/sbin/xrdp-sesman --daemon || true
          sleep 2
          
          # Then start xrdp
          sudo /usr/sbin/xrdp --nodaemon &
          sleep 3
          
          # Verify
          echo "=== Checking processes ==="
          ps aux | grep -E "(xrdp|xfce|dbus)" | grep -v grep || echo "⚠️ Some processes may not show yet"
          
          echo "=== Checking port 3389 ==="
          sudo ss -tlnp | grep 3389 || echo "⚠️ Port 3389 not listening yet"
          
          echo "✅ XRDP configuration complete!"

      # ─────────────────────────────────────────
      # SETUP TAILSCALE
      # ─────────────────────────────────────────
      - name: 🌐 Setup Tailscale
        env:
          TS_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey $TS_AUTH_KEY \
            --accept-routes \
            --hostname "ubuntu-rdp-fixed"
          
          TAILSCALE_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV
          
          echo "✅ Tailscale IP: $TAILSCALE_IP"

      # ─────────────────────────────────────────
      # SHOW CONNECTION INFO
      # ─────────────────────────────────────────
      - name: 📋 Connection Info
        run: |
          echo "========================================"
          echo "  🖥️  RDP CONNECTION DETAILS"
          echo "========================================"
          echo "  🌐 TAILSCALE IP: ${{ env.TAILSCALE_IP }}"
          echo "  👤 USERNAME  : kavishka"
          echo "  🔑 PASSWORD  : (from secrets)"
          echo "  🔌 PORT      : 3389"
          echo "========================================"
          echo "  💡 HOW TO CONNECT:"
          echo "  1. Install Tailscale on your device"
          echo "  2. Sign in with same account"
          echo "  3. Open Remote Desktop (mstsc)"
          echo "  4. Connect to: ${{ env.TAILSCALE_IP }}"
          echo "  5. Login: kavishka / your password"
          echo "========================================"
          echo "  ⏳ Session: 4h 30min | Auto-restart"
          echo "========================================"

      - name: ⏳ Keep alive (4h 30min)
        run: sleep 16200

      - name: 💾 Backup
        run: |
          mkdir -p backup
          sudo tar -czf backup/kavishka-backup.tar.gz -C /home/kavishka . \
            --exclude='.cache' --exclude='*.log' --exclude='__pycache__' 2>/dev/null
          git add backup/
          git commit -m "💾 Backup $(date +%Y-%m-%d)" || true
          git push origin HEAD || true

      - name: 🔄 Trigger next
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh workflow run rdp.yml
