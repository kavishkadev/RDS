name: Kavishka

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: ⚡ Optimize system
        run: |
          sudo systemctl disable --now apport unattended-upgrades 2>/dev/null || true
          sudo swapoff -a || true

      - name: 📦 Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: 🔧 Configure Git
        run: |
          git config user.name "RDP Bot"
          git config user.email "rdp@github.com"

      - name: 👤 Create user
        run: |
          sudo useradd -m -s /bin/bash kavishka
          echo "kavishka:${{ secrets.RDP_PASSWORD }}" | sudo chpasswd
          sudo usermod -aG sudo kavishka

      - name: 💾 Restore backup
        run: |
          if [ -f "backup/kavishka-backup.tar.gz" ]; then
            sudo tar -xzf backup/kavishka-backup.tar.gz -C /home/kavishka/
            sudo chown -R kavishka:kavishka /home/kavishka/
          fi

      - name: 📥 Install XFCE + XRDP
        run: |
          sudo apt update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            xfce4 xfce4-goodies xrdp xorgxrdp firefox wget curl \
            --no-install-recommends

      - name: 🚀 Configure XRDP
        run: |
          echo "startxfce4" | sudo tee /home/kavishka/.xsession > /dev/null
          sudo chown kavishka:kavishka /home/kavishka/.xsession
          sudo xrdp || true
          sudo xrdp-sesman || true
          sleep 3

      - name: 🌐 Cloudflare Tunnel
        env:
          CF_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          cloudflared tunnel --no-autoupdate run --token $CF_TOKEN > /tmp/cf.log 2>&1 &
          sleep 10
          
          echo "✅ Tunnel started! Check Cloudflare dashboard for hostname"

      - name: 📋 Connection Info
        run: |
          echo "========================================"
          echo "  ✅ RDP READY!"
          echo "========================================"
          echo "  👤 Username: kavishka"
          echo "  🔑 Password: ${{ secrets.RDP_PASSWORD }}"
          echo ""
          echo "  🌐 Open https://dash.teams.cloudflare.com/"
          echo "     to see your tunnel hostname"
          echo "========================================"

      - name: ⏳ Keep alive
        run: sleep 16200

      - name: 💾 Backup
        run: |
          mkdir -p backup
          sudo tar -czf backup/kavishka-backup.tar.gz -C /home/kavishka . \
            --exclude='.cache' --exclude='*.log' 2>/dev/null
          git add backup/
          git commit -m "Backup $(date +%Y-%m-%d)" || true
          git push origin HEAD || true

      - name: 🔄 Trigger next
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh workflow run rdp.yml
