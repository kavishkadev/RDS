name: Kavishka

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ─────────────────────────────────────────
      # SYSTEM OPTIMIZATION
      # ─────────────────────────────────────────
      - name: ⚡ Optimize system performance
        run: |
          sudo systemctl disable --now apport unattended-upgrades \
            apt-daily.timer apt-daily-upgrade.timer \
            motd-news.timer fwupd 2>/dev/null || true

          sudo sysctl -w vm.swappiness=10
          sudo sysctl -w vm.vfs_cache_pressure=50
          sudo sysctl -w net.core.rmem_max=134217728
          sudo sysctl -w net.core.wmem_max=134217728

          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "✅ Swap created: $(free -h | grep Swap)"

      # ─────────────────────────────────────────
      # CHECKOUT & GIT CONFIG
      # ─────────────────────────────────────────
      - name: 📦 Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: 🔧 Configure Git
        run: |
          git config user.name "RDP Bot"
          git config user.email "rdpbot@github.com"

      # ─────────────────────────────────────────
      # CREATE USER
      # ─────────────────────────────────────────
      - name: 👤 Create RDP user
        run: |
          sudo useradd -m -s /bin/bash kavishka
          echo "kavishka:${{ secrets.RDP_PASSWORD }}" | sudo chpasswd
          sudo usermod -aG sudo kavishka
          sudo usermod -aG audio,video kavishka

      # ─────────────────────────────────────────
      # RESTORE BACKUP
      # ─────────────────────────────────────────
      - name: 💾 Restore previous session data
        run: |
          if [ -f "backup/kavishka-backup.tar.gz" ]; then
            echo "✅ Backup found! Restoring..."
            sudo tar -xzf backup/kavishka-backup.tar.gz -C /home/kavishka/
            sudo chown -R kavishka:kavishka /home/kavishka/
            echo "✅ Restore complete! Size: $(du -sh /home/kavishka | cut -f1)"
          else
            echo "⚠️ No backup found. Starting fresh."
          fi

      # ─────────────────────────────────────────
      # INSTALL PACKAGES
      # ─────────────────────────────────────────
      - name: 📥 Install XFCE + XRDP + Tools
        run: |
          sudo apt update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            xfce4 \
            xfce4-goodies \
            xfce4-terminal \
            xrdp \
            xorgxrdp \
            dbus-x11 \
            pulseaudio \
            firefox \
            wget \
            curl \
            git \
            htop \
            neofetch \
            unzip \
            zip \
            python3 \
            python3-pip \
            nodejs \
            npm \
            fonts-noto \
            openssh-client \
            --no-install-recommends
          echo "✅ All packages installed!"

      # ─────────────────────────────────────────
      # CONFIGURE XRDP
      # ─────────────────────────────────────────
      - name: 🚀 Configure XRDP
        run: |
          sudo pkill -9 xrdp || true
          sudo pkill -9 xrdp-sesman || true
          sleep 2
          
          echo "xfce4-session" | sudo tee /home/kavishka/.xsession > /dev/null
          sudo chown kavishka:kavishka /home/kavishka/.xsession
          sudo chmod 644 /home/kavishka/.xsession
          
          sudo xrdp || true
          sudo xrdp-sesman || true
          
          sleep 3
          
          echo "=== XRDP Status ==="
          ps aux | grep xrdp | grep -v grep
          sudo ss -tlnp | grep 3389 || echo "⚠️ Port 3389 not found"

      # ─────────────────────────────────────────
      # LOCALHOST.RUN TUNNEL (FREE SSH)
      # ─────────────────────────────────────────
      - name: 🌐 Setup localhost.run SSH tunnel
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/config
          Host localhost.run
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 60
            ServerAliveCountMax 3
          EOF

          echo "🚀 Starting SSH tunnel to localhost.run..."
          # Run tunnel in background, capture output
          ssh -R 0:localhost:3389 nokey@localhost.run > /tmp/tunnel.log 2>&1 &
          
          # Wait for tunnel to establish
          echo "⏳ Waiting for tunnel connection..."
          for i in {1..15}; do
            sleep 3
            if grep -qi "forwarding success\|localhost.run" /tmp/tunnel.log 2>/dev/null; then
              echo "✅ Tunnel established!"
              break
            fi
            echo "⏳ Attempt $i/15..."
          done
          
          # Show full log for debugging
          echo "=== Tunnel Log ==="
          cat /tmp/tunnel.log
          
          # Extract hostname & port (format: http://xxxxx.localhost.run:port)
          TUNNEL_LINE=$(grep -m1 "localhost.run" /tmp/tunnel.log || echo "")
          TUNNEL_HOST=$(echo "$TUNNEL_LINE" | grep -oP '[a-z0-9-]+\.localhost\.run' | head -1)
          TUNNEL_PORT=$(echo "$TUNNEL_LINE" | grep -oP ':(\d+)' | tail -1 | tr -d ':')
          
          if [ -z "$TUNNEL_HOST" ]; then
            echo "⚠️ Could not auto-parse tunnel address. Check logs above."
            TUNNEL_HOST="check-logs.localhost.run"
            TUNNEL_PORT="3389"
          fi
          
          echo "TUNNEL_HOST=$TUNNEL_HOST" >> $GITHUB_ENV
          echo "TUNNEL_PORT=$TUNNEL_PORT" >> $GITHUB_ENV
          echo "✅ Ready to connect: $TUNNEL_HOST:$TUNNEL_PORT"

      # ─────────────────────────────────────────
      # SHOW CONNECTION INFO
      # ─────────────────────────────────────────
      - name: 📋 Connection Info
        run: |
          echo "========================================"
          echo "  🖥️  RDP CONNECTION DETAILS"
          echo "========================================"
          echo "  🌐 SERVER    : ${{ env.TUNNEL_HOST }}"
          echo "  🔌 PORT      : ${{ env.TUNNEL_PORT }}"
          echo "  👤 USERNAME  : kavishka"
          echo "  🔑 PASSWORD  : ${{ secrets.RDP_PASSWORD }}"
          echo "========================================"
          echo "  💡 Windows:"
          echo "     Win+R → mstsc"
          echo "     Computer: ${{ env.TUNNEL_HOST }}:${{ env.TUNNEL_PORT }}"
          echo ""
          echo "  💡 Linux:"
          echo "     xfreerdp /v:${{ env.TUNNEL_HOST }}:${{ env.TUNNEL_PORT }} /u:kavishka /p:${{ secrets.RDP_PASSWORD }}"
          echo "========================================"
          echo "  XRDP: $(pgrep -x xrdp > /dev/null && echo '✅ Running' || echo '❌ Stopped')"
          echo "  RAM: $(free -h | grep Mem | awk '{print $3"/"$2}')"
          echo "  CPU: $(nproc) cores"
          echo "========================================"

      # ─────────────────────────────────────────
      # SESSION (4h 30min then backup)
      # ─────────────────────────────────────────
      - name: ⏳ Active session (4h 30min)
        run: sleep 16200

      # ─────────────────────────────────────────
      # BACKUP TO REPO
      # ─────────────────────────────────────────
      - name: 💾 Backup user data to repo
        run: |
          echo "💾 Starting backup..."
          mkdir -p backup

          sudo tar -czf backup/kavishka-backup.tar.gz \
            -C /home/kavishka . \
            --exclude='.cache' \
            --exclude='.mozilla/firefox/*/cache2' \
            --exclude='.config/google-chrome/Default/Cache' \
            --exclude='*.log' \
            --exclude='.local/share/recently-used.xbel' \
            --exclude='__pycache__' \
            --exclude='node_modules' \
            --exclude='.npm' \
            2>/dev/null

          BACKUP_SIZE=$(du -sh backup/kavishka-backup.tar.gz | cut -f1)
          echo "✅ Backup complete! Size: $BACKUP_SIZE"

      - name: 📤 Push backup to GitHub
        run: |
          git add backup/kavishka-backup.tar.gz
          if git diff --staged --quiet; then
            echo "⚠️ No changes to backup."
          else
            git commit -m "💾 Auto backup - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD
            echo "✅ Backup pushed successfully!"
          fi

      # ─────────────────────────────────────────
      # TRIGGER NEXT RUN
      # ─────────────────────────────────────────
      - name: 🔄 Trigger next session
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run rdp.yml
          echo "✅ Next session triggered!"
          echo "⏳ New RDP ready in ~3 minutes..."
