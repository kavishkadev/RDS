name: Kavishka RDP (playit.gg Test)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: 👤 Create user
        run: |
          sudo useradd -m -s /bin/bash kavishka
          echo "kavishka:${{ secrets.RDP_PASSWORD }}" | sudo chpasswd
          sudo usermod -aG sudo kavishka

      - name: 📥 Install XRDP
        run: |
          sudo apt update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
            xfce4 xfce4-goodies xrdp xorgxrdp --no-install-recommends
          echo "startxfce4" | sudo tee /home/kavishka/.xsession > /dev/null
          sudo chown kavishka:kavishka /home/kavishka/.xsession

      - name: 🚀 Start XRDP
        run: |
          sudo xrdp || true
          sudo xrdp-sesman || true
          sleep 3

      - name: 🌐 Setup playit.gg (Test)
        run: |
          # Download playit agent
          wget -q https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit-linux-amd64
          
          echo "🚀 Starting playit.gg tunnel..."
          # This may fail due to GitHub firewall - that's expected
          ./playit-linux-amd64 --tunnel-type tcp --local-port 3389 > /tmp/playit.log 2>&1 &
          
          sleep 15
          
          echo "=== playit.gg Log ==="
          cat /tmp/playit.log
          echo "====================="
          
          if grep -qi "forwarding\|tunnel.*ready\|connected" /tmp/playit.log; then
            echo "✅ Tunnel might be working! Check logs for address."
          else
            echo "⚠️ Tunnel likely failed (GitHub firewall blocks outbound TCP)."
            echo "💡 Try EU.org + Cloudflare Tunnel instead (confirmed working)."
          fi

      - name: 📋 Connection Info
        run: |
          echo "========================================"
          echo "  🖥️  RDP CONNECTION DETAILS"
          echo "========================================"
          echo "  If playit.gg worked:"
          echo "     - Check logs above for your address"
          echo "     - Format: xxx.playit.gg:port"
          echo ""
          echo "  If it failed (likely):"
          echo "     ✅ Working alternative: EU.org + Cloudflare"
          echo "        1. Register: https://nic.eu.org"
          echo "        2. Wait 1-3 days"
          echo "        3. Add to Cloudflare + use TCP tunnel"
          echo "        4. Connect to: rdp.kavishka.eu.org"
          echo "========================================"

      - name: ⏳ Keep alive
        run: sleep 16200

      - name: 🔄 Trigger next
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh workflow run rdp.yml
