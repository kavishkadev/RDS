name: Windows 11

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      # ─────────────────────────────────────────
      # SYSTEM INFO
      # ─────────────────────────────────────────
      - name: System Info
        shell: powershell
        run: |
          $os = (Get-WmiObject Win32_OperatingSystem).Caption
          $ram = [math]::Round((Get-WmiObject Win32_ComputerSystem).TotalPhysicalMemory/1GB, 2)
          Write-Host "========================================"
          Write-Host "Windows: $os"
          Write-Host "CPU Cores: $env:NUMBER_OF_PROCESSORS"
          Write-Host "RAM: $ram GB"
          Write-Host "========================================"

      # ─────────────────────────────────────────
      # CHECKOUT REPO
      # ─────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        shell: bash
        run: |
          git config user.name "RDP Bot"
          git config user.email "rdpbot@github.com"

      # ─────────────────────────────────────────
      # DISABLE PASSWORD POLICY FIRST
      # ─────────────────────────────────────────
      - name: Disable password policy
        shell: powershell
        run: |
          Write-Host "Disabling password complexity policy..."

          # Export current security policy
          secedit /export /cfg C:\secpol.cfg /quiet

          # Read and modify
          $content = Get-Content C:\secpol.cfg

          # Disable complexity
          $content = $content -replace "PasswordComplexity\s*=\s*\d", "PasswordComplexity = 0"
          # Set minimum length to 1
          $content = $content -replace "MinimumPasswordLength\s*=\s*\d+", "MinimumPasswordLength = 1"
          # Disable password history
          $content = $content -replace "PasswordHistorySize\s*=\s*\d+", "PasswordHistorySize = 0"
          # Set max password age to 0 (never expires)
          $content = $content -replace "MaximumPasswordAge\s*=\s*\d+", "MaximumPasswordAge = -1"

          # Save modified policy
          $content | Set-Content C:\secpol.cfg

          # Apply the modified policy
          secedit /configure /db C:\Windows\security\local.sdb /cfg C:\secpol.cfg /quiet

          Write-Host "Password policy disabled!"

      # ─────────────────────────────────────────
      # CREATE USER KAVISHKA
      # ─────────────────────────────────────────
      - name: Create user kavishka
        shell: powershell
        run: |
          $pass = "${{ secrets.RDP_PASSWORD }}"

          Write-Host "Creating user kavishka..."

          # Delete if exists to start fresh
          net user kavishka /delete 2>$null
          Start-Sleep -Seconds 2

          # Create user
          net user kavishka $pass /add /y
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Failed to create user! Exit: $LASTEXITCODE"
            exit 1
          }
          Write-Host "User created!"

          # Add to groups
          net localgroup Administrators kavishka /add /y
          net localgroup "Remote Desktop Users" kavishka /add /y

          # Set account to never expire
          net user kavishka /expires:never
          net user kavishka /active:yes

          # Disable password expiry via wmic
          wmic useraccount where "name='kavishka'" set PasswordExpires=FALSE

          Write-Host "========================================"
          Write-Host "User kavishka setup complete!"
          net user kavishka
          Write-Host "========================================"

      # ─────────────────────────────────────────
      # RESTORE BACKUP
      # ─────────────────────────────────────────
      - name: Restore previous session data
        shell: powershell
        run: |
          if (Test-Path "backup\userdata.zip") {
            Write-Host "Backup found! Restoring..."
            New-Item -ItemType Directory -Force -Path "C:\Users\kavishka" | Out-Null
            Expand-Archive -Path "backup\userdata.zip" `
              -DestinationPath "C:\Users\kavishka\" -Force
            Write-Host "Restore complete!"
          } else {
            Write-Host "No backup found. Starting fresh."
          }

      # ─────────────────────────────────────────
      # ENABLE RDP
      # ─────────────────────────────────────────
      - name: Enable RDP
        shell: powershell
        run: |
          # Enable Remote Desktop
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          # Disable NLA
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "SecurityLayer" -Value 0

          # Enable firewall rules
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Start RDP service
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService

          Write-Host "RDP Enabled!"
          Write-Host "RDP Service: $((Get-Service TermService).Status)"

      # ─────────────────────────────────────────
      # INSTALL TAILSCALE
      # ─────────────────────────────────────────
      - name: Install Tailscale
        shell: powershell
        run: |
          Write-Host "Downloading Tailscale..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe"
          $out = Join-Path $env:TEMP "tailscale-setup.exe"

          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Write-Host "Download complete. Installing..."

          $proc = Start-Process -FilePath $out `
            -ArgumentList "/S" -Wait -PassThru -NoNewWindow
          Write-Host "Installer exit code: $($proc.ExitCode)"
          Start-Sleep -Seconds 15

          $tsPath = "C:\Program Files\Tailscale\tailscale.exe"
          if (Test-Path $tsPath) {
            Write-Host "Tailscale installed OK!"
          } else {
            $found = Get-ChildItem "C:\Program Files\" `
              -Recurse -Filter "tailscale.exe" -ErrorAction SilentlyContinue |
              Select-Object -First 1
            if ($found) {
              Write-Host "Found at: $($found.FullName)"
            } else {
              Write-Host "ERROR: tailscale.exe not found!"
              exit 1
            }
          }

      # ─────────────────────────────────────────
      # CONNECT TAILSCALE
      # ─────────────────────────────────────────
      - name: Connect Tailscale
        shell: powershell
        run: |
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsExe)) {
            $tsExe = (Get-ChildItem "C:\" -Recurse -Filter "tailscale.exe" `
              -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          Write-Host "Tailscale: $tsExe"

          $tsKey = "${{ secrets.TS_AUTHKEY }}"
          & $tsExe up --authkey=$tsKey --hostname="github-rdp" --accept-routes
          Start-Sleep -Seconds 15

          $tsIP = (& $tsExe ip -4).Trim()
          Write-Host "========================================"
          Write-Host "Tailscale Connected!"
          Write-Host "FIXED RDP IP : $tsIP"
          Write-Host "USERNAME     : kavishka"
          Write-Host "PASSWORD     : your RDP_PASSWORD secret"
          Write-Host "PORT         : 3389"
          Write-Host "========================================"

          Set-Content -Path "rdp-info.txt" -Value "RDP_IP=$tsIP"
          Add-Content -Path "rdp-info.txt" -Value "USERNAME=kavishka"
          Add-Content -Path "rdp-info.txt" -Value "PORT=3389"
          Add-Content -Path "rdp-info.txt" -Value "STARTED=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') UTC"
          Add-Content -Path "rdp-info.txt" -Value "EXPIRES=$((Get-Date).AddHours(5).ToString('yyyy-MM-dd HH:mm:ss')) UTC"

      # ─────────────────────────────────────────
      # PUSH RDP INFO
      # ─────────────────────────────────────────
      - name: Push RDP info to repo
        shell: bash
        run: |
          git add rdp-info.txt
          git diff --staged --quiet || git commit -m "RDP IP updated - $(date)"
          git push origin HEAD || true

      # ─────────────────────────────────────────
      # CONNECTION DETAILS
      # ─────────────────────────────────────────
      - name: Connection Details
        shell: powershell
        run: |
          $tsExe = "C:\Program Files\Tailscale\tailscale.exe"
          $tsIP  = (& $tsExe ip -4).Trim()
          $ram   = [math]::Round((Get-WmiObject Win32_ComputerSystem).TotalPhysicalMemory/1GB, 2)
          $disk  = [math]::Round((Get-PSDrive C).Free/1GB, 2)

          Write-Host "========================================"
          Write-Host "  WINDOWS RDP - READY TO CONNECT"
          Write-Host "========================================"
          Write-Host "  IP       : $tsIP"
          Write-Host "  USERNAME : kavishka"
          Write-Host "  PASSWORD : your RDP_PASSWORD secret"
          Write-Host "  PORT     : 3389"
          Write-Host "========================================"
          Write-Host "  HOW TO CONNECT:"
          Write-Host "  1. Install Tailscale on your PC"
          Write-Host "  2. Login with SAME Tailscale account"
          Write-Host "  3. Win+R -> mstsc -> Enter"
          Write-Host "  4. Computer: $tsIP"
          Write-Host "  5. Username: kavishka"
          Write-Host "  6. Password: your RDP_PASSWORD"
          Write-Host "========================================"
          Write-Host "  RAM  : $ram GB"
          Write-Host "  CPU  : $env:NUMBER_OF_PROCESSORS cores"
          Write-Host "  DISK : $disk GB free"
          Write-Host "========================================"

      # ─────────────────────────────────────────
      # SESSION 4h 30min
      # ─────────────────────────────────────────
      - name: Active session 4h 30min
        shell: powershell
        run: Start-Sleep -Seconds 16200

      # ─────────────────────────────────────────
      # BACKUP
      # ─────────────────────────────────────────
      - name: Backup user data
        shell: powershell
        run: |
          Write-Host "Starting backup..."
          New-Item -ItemType Directory -Force -Path "backup" | Out-Null

          $items = @(
            "C:\Users\kavishka\Desktop",
            "C:\Users\kavishka\Documents",
            "C:\Users\kavishka\Downloads"
          )

          $existing = $items | Where-Object { Test-Path $_ }

          if ($existing.Count -gt 0) {
            Compress-Archive -Path $existing `
              -DestinationPath "backup\userdata.zip" -Force
            $size = [math]::Round((Get-Item "backup\userdata.zip").Length/1MB, 2)
            Write-Host "Backup complete! Size: $size MB"
          } else {
            Write-Host "No user data to backup yet."
          }

      - name: Push backup to GitHub
        shell: bash
        run: |
          git add backup/userdata.zip rdp-info.txt 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "Auto backup - $(date '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin HEAD || true

      # ─────────────────────────────────────────
      # TRIGGER NEXT RUN
      # ─────────────────────────────────────────
      - name: Trigger next session
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run rdp.yml
          echo "Next session triggered!"
          echo "Windows RDP ready again in about 3 minutes!"
